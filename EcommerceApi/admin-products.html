<!-- admin-products.html -->
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ranita Admin • Produits</title>
    <link rel="stylesheet" href="admin.css" />
    <script defer src="app.js"></script>
    <script defer src="admin-products.js"></script>
</head>
<body>
    <div id="adminHeader"></div>

    <main class="container">
        <h1>Produits</h1>

        <div class="card">
            <div class="row">
                <input id="q" class="input" placeholder="Rechercher un produit..." />
                <button id="btnSearch" class="btn">Rechercher</button>
                <button id="btnNew" class="btn btn-primary">+ Nouveau</button>
            </div>
        </div>

        <div class="grid2">
            <section class="card">
                <h2>Formulaire</h2>

                <input type="hidden" id="productId" />

                <label>Nom</label>
                <input id="name" class="input" />

                <label>Prix</label>
                <input id="price" type="number" step="0.01" class="input" />

                <label>Stock</label>
                <input id="stock" type="number" class="input" />

                <label>Catégorie (id)</label>
                <input id="categoryId" type="number" class="input" placeholder="Ex: 1" />

                <label>Actif</label>
                <select id="isActive" class="input">
                    <option value="true">Oui</option>
                    <option value="false">Non</option>
                </select>

                <label>Description courte</label>
                <input id="shortDesc" class="input" />

                <label>Description</label>
                <textarea id="desc" class="input" rows="6"></textarea>

                <div class="row">
                    <button id="btnSave" class="btn btn-primary">Enregistrer</button>
                    <button id="btnDisable" class="btn btn-danger">Désactiver</button>
                </div>

                <hr />

                <h3>Images</h3>
                <input id="images" type="file" multiple accept="image/*" />
                <button id="btnUpload" class="btn">Uploader</button>

                <div id="imagesList" class="imagesList"></div>
            </section>

            <section class="card">
                <h2>Liste</h2>
                <div id="list" class="table"></div>
            </section>
        </div>
    </main>
</body>
</html>

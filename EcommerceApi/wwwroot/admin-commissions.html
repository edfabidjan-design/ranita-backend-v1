<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ranita Admin - Commissions</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">

    <style>
        .filters-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            margin: 16px 0 20px;
            flex-wrap: nowrap; /* 🔥 empêche retour à la ligne */
        }

        .date-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

            .date-group label {
                font-size: 12px;
                color: #94a3b8;
            }

            .date-group input[type="date"] {
                background: #0b1220;
                border: 1px solid #1f2937;
                padding: 8px 10px;
                color: #e5e7eb;
                border-radius: 10px;
                min-width: 170px;
            }

        .filters-row .btn {
            height: 38px;
            padding: 0 16px;
        }
        /* ✅ KPI GRID - desktop */
        .grid.kpi-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
        }

        /* écrans moyens */
        @media (max-width: 1200px) {
            .grid.kpi-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 900px) {
            .grid.kpi-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        /* ✅ mobile: swipe horizontal (comme un dashboard pro) */
        @media (max-width: 700px) {
            .grid.kpi-grid {
                display: flex;
                overflow-x: auto;
                gap: 14px;
                padding-bottom: 10px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }

                .grid.kpi-grid .card {
                    min-width: 230px;
                    flex: 0 0 auto;
                    scroll-snap-align: start;
                }

                .grid.kpi-grid::-webkit-scrollbar {
                    height: 6px;
                }

                .grid.kpi-grid::-webkit-scrollbar-thumb {
                    background: #1f2937;
                    border-radius: 10px;
                }
        }

        /* ✅ cards */
        .grid.kpi-grid .card {
            padding: 18px 20px;
            border-radius: 18px;
            min-height: 100px;
            overflow: hidden;
        }

            .grid.kpi-grid .card h3 {
                font-size: 12px;
                line-height: 1.25;
                margin: 0 0 10px;
                color: #9aa7bd;
                word-break: break-word;
            }

            .grid.kpi-grid .card .value {
                font-size: 20px;
                font-weight: 700;
                color: #22c55e;
            }

        /* ✅ GUTTER GLOBAL : empêche toucher les extrémités */
        .admin-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 18px !important;
            padding-right: 18px !important;
        }

        /* ✅ encore plus d’air sur grand écran */
        @media (min-width: 1200px) {
            .admin-wrap {
                padding-left: 24px !important;
                padding-right: 24px !important;
            }
        }

        /* ✅ mobile : marges visibles + pas de collage */
        @media (max-width: 700px) {
            .admin-wrap {
                padding-left: 14px !important;
                padding-right: 14px !important;
            }
        }

        /* ✅ au cas où base.css force des cards trop larges */
        .grid.kpi-grid {
            width: 100%;
        }

            /* ✅ petit safety: ne jamais dépasser l'écran */
            .grid.kpi-grid .card {
                max-width: 100%;
            }
        /* =========================
           RESPONSIVE GLOBAL
        ========================= */

        /* Container */
        .admin-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 18px;
        }

        @media (max-width: 700px) {
            .admin-wrap {
                padding: 14px 12px;
            }
        }

        /* =========================
           FILTRES : responsive
        ========================= */
        .filters-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            margin: 12px 0 18px;
        }

        /* ✅ Mobile : on autorise le retour à la ligne + largeur 100% */
        @media (max-width: 700px) {
            .filters-row {
                flex-wrap: wrap;
                align-items: stretch;
            }

            .date-group {
                flex: 1 1 160px; /* 2 champs côte à côte si possible */
            }

                .date-group input[type="date"] {
                    width: 100%;
                    min-width: 0; /* super important sinon ça déborde */
                }

            #btnLoad {
                width: 100%;
                height: 42px;
            }
        }

        /* =========================
           KPI GRID : responsive
        ========================= */

        /* =========================
           RESPONSIVE CLEAN
        ========================= */

        .admin-wrap {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 18px;
        }

        .card,
        .tableCard {
            width: 100%;
            overflow: hidden;
        }

        /* =========================
           FILTRES
        ========================= */
        .filters-row {
            display: flex;
            align-items: end;
            gap: 12px;
            margin: 16px 0 20px;
            flex-wrap: wrap;
        }

        .date-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
            flex: 1 1 180px;
        }

            .date-group label {
                font-size: 12px;
                color: #94a3b8;
            }

            .date-group input[type="date"] {
                width: 100%;
                min-width: 0;
                background: #0b1220;
                border: 1px solid #1f2937;
                padding: 10px 12px;
                color: #e5e7eb;
                border-radius: 10px;
            }

        #btnLoad {
            flex: 0 0 auto;
            height: 42px;
            padding: 0 18px;
        }

        /* =========================
           KPI GRID
        ========================= */
        .grid.kpi-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
            width: 100%;
        }

            .grid.kpi-grid .card {
                padding: 18px 20px;
                border-radius: 18px;
                min-width: 0;
                min-height: 100px;
            }

                .grid.kpi-grid .card h3 {
                    margin: 0 0 10px;
                    font-size: 12px;
                    line-height: 1.3;
                    color: #9aa7bd;
                    word-break: break-word;
                }

                .grid.kpi-grid .card .value {
                    font-size: 20px;
                    font-weight: 700;
                    color: #22c55e;
                    word-break: break-word;
                }

        /* =========================
           CHART
        ========================= */
        .chart-card {
            margin-top: 10px;
        }

        .chart-wrap {
            width: 100%;
            height: 320px;
            position: relative;
        }

            .chart-wrap canvas {
                width: 100% !important;
                height: 100% !important;
            }

        /* =========================
           TABLE
        ========================= */
        .tableWrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 14px;
        }

            .tableWrap table {
                width: 100%;
                min-width: 820px;
                border-collapse: collapse;
            }

            .tableWrap th,
            .tableWrap td {
                white-space: nowrap;
            }

        /* =========================
           TABLETTE
        ========================= */
        @media (max-width: 1200px) {
            .grid.kpi-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 900px) {
            .grid.kpi-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        /* =========================
           MOBILE
        ========================= */
        @media (max-width: 700px) {
            .admin-wrap {
                padding: 14px 12px;
            }

            .filters-row {
                flex-direction: column;
                align-items: stretch;
            }

            .date-group {
                width: 100%;
                flex: 1 1 auto;
            }

            #btnLoad {
                width: 100%;
            }

            .grid.kpi-grid {
                display: flex;
                overflow-x: auto;
                gap: 14px;
                padding-bottom: 6px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }

                .grid.kpi-grid .card {
                    min-width: 240px;
                    flex: 0 0 auto;
                    scroll-snap-align: start;
                }

                .grid.kpi-grid::-webkit-scrollbar {
                    height: 6px;
                }

                .grid.kpi-grid::-webkit-scrollbar-thumb {
                    background: #1f2937;
                    border-radius: 10px;
                }

            .chart-wrap {
                height: 260px;
            }
        }

        /* =========================
           PETITS MOBILES
        ========================= */
        @media (max-width: 480px) {
            .admin-wrap {
                padding: 12px 10px;
            }

            .grid.kpi-grid .card {
                min-width: 220px;
                padding: 16px;
            }

                .grid.kpi-grid .card .value {
                    font-size: 18px;
                }

            .chart-wrap {
                height: 220px;
            }

            .tableWrap table {
                min-width: 760px;
            }
        }


    </style>
</head>

<body class="admin-body">

    <div class="admin-shell">

        <!-- HEADER -->
        <header class="admin-header">
            <div id="appHeader"></div>
        </header>

        <!-- CONTENU -->
        <main class="admin-content">
            <div class="page-admin">
                <div class="container">

                    <!-- TITRE -->
                    <section class="dashboard-head">
                        <h1 id="pageTitle"></h1>
                        <p class="dashboard-subtitle">
                            Suivi des commissions et statistiques
                        </p>
                    </section>


                    <!-- ✅ ton contenu -->
                    <div class="filters-row">
                        <div class="date-group">
                            <label>Du</label>
                            <input type="date" id="startDate" />
                        </div>

                        <div class="date-group">
                            <label>Au</label>
                            <input type="date" id="endDate" />
                        </div>

                        <button class="btn btnGreen" id="btnLoad">Charger</button>
                    </div>

                    <div class="grid kpi-grid">
                        <div class="card">
                            <h3>Solde Total Commission</h3>
                            <div class="value" id="adminBalance">0 FCFA</div>
                        </div>

                        <div class="card">
                            <h3>Commission sur semaine</h3>
                            <div class="value" id="totalCommission">0 FCFA</div>
                        </div>

                        <div class="card">
                            <h3>Commission du jour</h3>
                            <div class="value" id="todayTotal">0 FCFA</div>
                        </div>

                        <div class="card">
                            <h3>Nombre Commandes (semaine)</h3>
                            <div class="value" id="totalOrders">0</div>
                        </div>

                        <div class="card">
                            <h3>Lignes Commission (semaine)</h3>
                            <div class="value" id="countLines">0</div>
                        </div>
                    </div>

                    <div class="card chart-card">
                        <h3 style="margin:0 0 10px;color:#94a3b8;font-size:14px;">📈 Évolution commissions (jours)</h3>
                        <div class="chart-wrap">
                            <canvas id="commChart"></canvas>
                        </div>
                    </div>

                    <div class="card tableCard" style="margin-top:16px;">
                        <div class="tableWrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Boutique</th>
                                        <th>Order</th>
                                        <th>OrderItem</th>
                                        <th>Montant</th>
                                        <th>Date</th>
                                        <th>Note</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </div>


<!-- ✅ scripts : app.js DOIT être chargé avant admin-commissions.js -->
<script src="/assets/js/app.js?v=1002"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/assets/js/admin-commissions.js?v=1002"></script>









</body>
</html>

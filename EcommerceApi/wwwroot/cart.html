<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
    <title>Ranita - Panier</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background: #0b1220;
            color: #e5e7eb;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .topTitle {
            font-weight: 900;
            font-size: 20px;
        }

        .btn {
            padding: 10px 12px;
            border: 1px solid #1f2937;
            border-radius: 12px;
            background: #111827;
            color: #e5e7eb;
            cursor: pointer;
            font-weight: 700;
        }

        .btnG {
            background: #22c55e;
            color: #06240f;
            border: 0;
        }

        .box {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .line {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1f2937;
        }

            .line:last-child {
                border-bottom: 0;
            }

        .img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 12px;
            background: #0b1220;
        }

        .lineInfo {
            min-width: 0;
        }

        .lineTitle {
            font-size: 16px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .lineMeta {
            color: #9ca3af;
            line-height: 1.35;
            word-break: break-word;
        }

        .muted {
            color: #9ca3af;
        }

        .qtyBox {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .qtyBtn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            background: #0b1220;
            color: #e5e7eb;
            font-weight: 900;
            cursor: pointer;
            flex: 0 0 40px;
        }

        .qtyVal {
            min-width: 32px;
            text-align: center;
            font-weight: 900;
            font-size: 20px;
        }

        .btnDelete {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            background: #0b1220;
            color: #e5e7eb;
            font-weight: 900;
            cursor: pointer;
            flex: 0 0 40px;
        }

        .subTotal {
            font-size: 20px;
            font-weight: 900;
        }

        button:focus {
            outline: none;
        }

        button:focus-visible {
            outline: 2px solid #22c55e;
            outline-offset: 2px;
        }

        .qtyBtn:active,
        .btn:active,
        .btnDelete:active {
            transform: scale(0.98);
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .top {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 10px;
                align-items: center;
            }

                .top .btn {
                    min-height: 48px;
                }

            .topTitle {
                text-align: right;
                font-size: 18px;
            }

            .box {
                padding: 14px;
                border-radius: 18px;
            }

            .line {
                grid-template-columns: 72px minmax(0, 1fr);
                gap: 12px;
                align-items: start;
            }

            .lineInfo {
                min-width: 0;
            }

            .lineTitle {
                font-size: 15px;
            }

            .lineMeta {
                font-size: 14px;
            }

            .qtyBox {
                grid-column: 1 / -1;
                justify-content: flex-start;
                margin-top: 8px;
                padding-left: 84px;
            }

            .qtyBtn,
            .btnDelete {
                width: 44px;
                height: 44px;
                flex: 0 0 44px;
            }

            .qtyVal {
                min-width: 36px;
                font-size: 18px;
            }

            #btnCommander {
                min-height: 52px;
                font-size: 16px;
                border-radius: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="top">
        <button class="btn" onclick="location.href='/products.html'">⬅ Continuer achats</button>
        <div class="topTitle">🛒 Panier</div>
    </div>

    <div class="box" id="lines"></div>

    <div class="box">
        <div class="muted">Sous-total</div>
        <div style="font-size:20px;font-weight:900" id="sub">0 FCFA</div>
        <button class="btn btnG" style="margin-top:10px;width:100%" id="btnCommander" onclick="location.href='/checkout.html'">
            ✅ Commander
        </button>
    </div>

    <script src="/assets/js/app.js?v=1002"></script>
    <script src="/assets/js/api.js?v=1002"></script>
    <script src="/assets/js/cart-core.js?v=1002"></script>
    <script src="/assets/js/cart-ui.js?v=1002"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (typeof window.loadLiveCatalogOnce === "function") {
                await window.loadLiveCatalogOnce();
            }

            if (typeof window.renderCartPage === "function") {
                window.renderCartPage();
            }

            const lines = document.getElementById("lines");
            if (typeof window.bindCartEvents === "function") {
                window.bindCartEvents(lines);
            }
        });
    </script>
</body>
</html>

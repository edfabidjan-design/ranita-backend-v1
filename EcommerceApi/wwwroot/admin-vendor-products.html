<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ranita Admin - Modération produits vendeurs</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">

    <!-- STYLE ONGLET ACTIF -->
    <style>
        .btn.active {
            border: 2px solid #f59e0b;
            box-shadow: 0 0 0 3px rgba(245,158,11,.18);
        }

            .btn.active[data-tab="Pending"] {
                border-color: #f59e0b;
            }

            .btn.active[data-tab="Published"] {
                border-color: #22c55e;
            }

            .btn.active[data-tab="Rejected"] {
                border-color: #ef4444;
            }

            .btn.active[data-tab="Deleted"] {
                border-color: #9ca3af;
            }

        body {
            margin: 0;
        }

        #appHeader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .pageWrap {
            padding-top: 150px;
            padding-left: 16px;
            padding-right: 16px;
            padding-bottom: 16px;
        }

        .pageTitleBlock {
            margin-bottom: 14px;
        }

        .moderationCard {
            margin-top: 12px;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div id="appHeader"></div>

    <main class="container pageWrap">
        <div class="pageTitleBlock">
            <h1 id="pageTitle">Modération produits vendeurs</h1>
        </div>

        <div class="card moderationCard">
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn" data-tab="Pending">Pending</button>
                    <button class="btn" data-tab="Published">Published</button>
                    <button class="btn" data-tab="Rejected">Rejected</button>
                    <button class="btn danger" data-tab="Deleted">Deleted</button>
                </div>

                <span class="muted" style="margin-left:auto;">Total:</span>
                <b id="countItems">0</b>
                <button id="btnRefresh" class="btn" style="margin-left:10px;">Rafraîchir</button>
            </div>

            <div id="msg" class="muted" style="margin-top:10px;"></div>

            <div style="overflow:auto;margin-top:12px;">
                <table class="table" style="min-width:1100px;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Nom</th>
                            <th>Statut</th>
                            <th>Catégorie</th>
                            <th>Prix</th>
                            <th>Stock</th>
                            <th>Boutique</th>
                            <th>Soumis le</th>
                            <th>VendorId</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemsBody">
                        <tr><td colspan="11" class="muted">Chargement…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/assets/js/app.js?v=1001"></script>
    <script src="/assets/js/admin-vendor-products.js?v=1001"></script>
</body>
</html>

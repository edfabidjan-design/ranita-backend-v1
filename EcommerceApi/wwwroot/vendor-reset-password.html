<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Réinitialisation vendeur - Ranita</title>
    <link rel="stylesheet" href="/css/base.css?v=1" />
    <style>
        .btnYellow {
            background: #facc15 !important;
            color: #111827 !important;
            border: 0 !important;
        }

            .btnYellow:hover {
                background: #eab308 !important;
            }

        .showPassRow {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

            .showPassRow input[type="checkbox"] {
                width: 16px;
                height: 16px;
                accent-color: #facc15;
                cursor: pointer;
            }
    </style>
</head>
<body>
    <main class="wrap" style="max-width:520px;margin:40px auto;padding:0 14px">
        <h1 style="margin:0 0 6px">🔐 Nouveau mot de passe vendeur</h1>
        <p class="muted" style="margin:0 0 18px">Saisis le code reçu par email puis ton nouveau mot de passe.</p>

        <div id="msg" class="msg" style="display:none"></div>

        <form id="frmReset">
            <label>Email</label>
            <input id="email" type="email" required placeholder="vendeur@gmail.com" />

            <label style="margin-top:12px">Code</label>
            <input id="code" type="text" required placeholder="Ex: 123456" maxlength="6" />

            <label style="margin-top:12px">Nouveau mot de passe</label>
            <input id="pwd" type="password" required placeholder="••••••" />

            <label style="margin-top:12px">Confirmer le mot de passe</label>
            <input id="pwd2" type="password" required placeholder="••••••" />

            <label class="showPassRow">
                <input type="checkbox" id="togglePwd" />
                <span>Afficher les mots de passe</span>
            </label>

            <button id="btnReset" class="btn btnYellow" style="width:100%;margin-top:16px" type="submit">
                Réinitialiser le mot de passe
            </button>

            <a href="/vendor-login.html"
               class="btn"
               style="margin-top:10px;display:block;text-align:center;background:transparent;border:1px solid rgba(255,255,255,.25);">
                Retour connexion vendeur
            </a>
        </form>
    </main>

    <script>
        const msg = document.getElementById("msg");
        const frm = document.getElementById("frmReset");
        const btn = document.getElementById("btnReset");
        const pwd = document.getElementById("pwd");
        const pwd2 = document.getElementById("pwd2");
        const togglePwd = document.getElementById("togglePwd");

        function show(text, ok = false) {
            msg.style.display = "block";
            msg.textContent = text;
            msg.style.border = "1px solid " + (ok ? "rgba(34,197,94,.35)" : "rgba(239,68,68,.35)");
            msg.style.background = "rgba(15,23,42,.6)";
            msg.style.color = ok ? "#bbf7d0" : "#fecaca";
            msg.style.padding = "10px";
            msg.style.borderRadius = "12px";
            msg.style.marginBottom = "12px";
        }

        function setLoading(v) {
            btn.disabled = v;
            btn.textContent = v ? "Traitement..." : "Réinitialiser le mot de passe";
        }

        togglePwd?.addEventListener("change", function () {
            const type = this.checked ? "text" : "password";
            pwd.type = type;
            pwd2.type = type;
        });

        frm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const code = document.getElementById("code").value.trim();
            const newPassword = pwd.value;
            const confirmPassword = pwd2.value;

            if (!email || !code || !newPassword || !confirmPassword) {
                show("Tous les champs sont obligatoires.");
                return;
            }

            if (newPassword.length < 4) {
                show("Mot de passe trop court.");
                return;
            }

            if (newPassword !== confirmPassword) {
                show("La confirmation du mot de passe est incorrecte.");
                return;
            }

            try {
                setLoading(true);

                const r = await fetch("/api/vendor-auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email,
                        code,
                        newPassword,
                        confirmPassword
                    })
                });

                const data = await r.json().catch(() => null);

                if (!r.ok || !data?.ok) {
                    throw new Error(data?.message || "Erreur.");
                }

                show("Mot de passe réinitialisé avec succès. Redirection...", true);

                setTimeout(() => {
                    location.href = "/vendor-login.html";
                }, 1200);
            } catch (e2) {
                show(e2?.message || "Erreur.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>

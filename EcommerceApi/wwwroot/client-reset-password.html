<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ranita - Réinitialiser le mot de passe</title>
    <link rel="stylesheet" href="/css/base.css?v=1" />
</head>
<body class="admin-body">
    <div class="wrap" style="max-width:520px;margin:28px auto;padding:14px;">
        <div class="card" style="padding:16px;border:1px solid #1f2937;border-radius:16px;background:#111827;color:#e5e7eb">
            <h2 style="margin:0 0 10px;font-weight:900">🔁 Réinitialiser le mot de passe</h2>
            <div style="color:#9ca3af;margin-bottom:12px">
                Saisis le code reçu puis ton nouveau mot de passe.
            </div>

            <div style="display:grid;gap:10px">
                <input id="login" placeholder="Téléphone ou Email"
                       style="padding:12px;border-radius:12px;border:1px solid #1f2937;background:#0b1220;color:#e5e7eb">

                <input id="code" placeholder="Code à 6 chiffres"
                       style="padding:12px;border-radius:12px;border:1px solid #1f2937;background:#0b1220;color:#e5e7eb">

                <input id="newPassword" type="password" placeholder="Nouveau mot de passe"
                       style="padding:12px;border-radius:12px;border:1px solid #1f2937;background:#0b1220;color:#e5e7eb">

                <input id="confirmPassword" type="password" placeholder="Confirmer le mot de passe"
                       style="padding:12px;border-radius:12px;border:1px solid #1f2937;background:#0b1220;color:#e5e7eb">

                <button id="btnReset"
                        style="padding:12px;border-radius:12px;border:0;background:#22c55e;color:#06240f;font-weight:900;cursor:pointer">
                    Réinitialiser
                </button>

                <div id="msg"
                     style="display:none;padding:10px;border-radius:12px;border:1px solid #374151;background:rgba(15,23,42,.6)">
                </div>
            </div>

            <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
                <a href="/client-login.html" class="btn"
                   style="padding:10px 12px;border-radius:12px;border:1px solid #1f2937;background:#111827;color:#e5e7eb;font-weight:800">
                    Retour connexion
                </a>
            </div>
        </div>
    </div>

    <script>
        const msg = document.getElementById("msg");

        function show(text, ok = false) {
            msg.style.display = "block";
            msg.style.borderColor = ok ? "rgba(34,197,94,.35)" : "rgba(239,68,68,.35)";
            msg.textContent = text;
        }

        document.getElementById("btnReset").addEventListener("click", async () => {
            try {
                const login = document.getElementById("login").value.trim();
                const code = document.getElementById("code").value.trim();
                const newPassword = document.getElementById("newPassword").value;
                const confirmPassword = document.getElementById("confirmPassword").value;

                const res = await fetch("/api/auth/client/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        login,
                        code,
                        newPassword,
                        confirmPassword
                    })
                });

                const data = await res.json().catch(() => null);

                if (!res.ok) {
                    throw new Error(data?.message || "Erreur.");
                }

                show("✅ " + (data?.message || "Mot de passe réinitialisé."), true);

                setTimeout(() => {
                    location.href = "/client-login.html";
                }, 1500);

            } catch (e) {
                show("❌ " + (e?.message || e));
            }
        });
    </script>
</body>
</html>

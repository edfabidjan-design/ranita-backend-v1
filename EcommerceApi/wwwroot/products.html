    <script>

        function refreshCount() {
            const t = (typeof window.cartTotals === "function") ? window.cartTotals() : { count: 0 };
            const el = document.getElementById("cartCount");
            if (el) el.textContent = t.count || 0;
        }

        // --- helpers panier
        function readCartSafe() {
            if (typeof window.getCart === "function") return window.getCart();
            try { return JSON.parse(localStorage.getItem("ranita_cart") || "[]"); }
            catch { return []; }
        }
        function qtyInCartByProductId(productId) {
            const cart = readCartSafe();
            const id = Number(productId);
            return cart.filter(x => Number(x.id) === id).reduce((sum, x) => sum + Number(x.qty || 0), 0);
        }
        function qtyInCartNoVariant(productId) {
            const cart = readCartSafe();
            const id = Number(productId);
            return cart
                .filter(x => Number(x.id) === id && !String(x.variantKey || "").trim())
                .reduce((sum, x) => sum + Number(x.qty || 0), 0);
        }

        function flashAdded(btn) {
            const old = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Ajouté ✓";
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = old;
            }, 900);
        }

        const PAGE_SIZE = 20;
        function getPageFromUrl() {
            const params = new URLSearchParams(location.search);
            const p = Number(params.get("page") || "1");
            return Number.isFinite(p) && p > 0 ? p : 1;
        }
        function setPageToUrl(page) {
            const u = new URL(location.href);
            u.searchParams.set("page", String(page));
            location.href = u.toString();
        }

        async function apiGetProductsPublicSafe(queryString = "") {
            if (typeof window.apiGetProductsPublic === "function")
                return await window.apiGetProductsPublic(queryString);

            if (typeof window.apiGetProducts === "function")
                return await window.apiGetProducts();

            const res = await fetch("/api/products" + (queryString || ""), { cache: "no-store" });
            const json = await res.json();
            if (!res.ok) throw new Error("api/products => " + res.status);
            return json;
        }

        function getCategoryPathFromUrl() {
            const p = (location.pathname || "").replace(/^\/+|\/+$/g, "");
            const parts = p.split("/");
            if (parts.length >= 2 && parts[0].toLowerCase() === "c") {
                return parts.slice(1).join("/");
            }
            const qs = new URLSearchParams(location.search);
            const cp = (qs.get("categoryPath") || "").trim().replace(/^\/+|\/+$/g, "");
            return cp || "";
        }

        function getCategoryQueryFromUrl() {
            const params = new URLSearchParams(location.search);
            return {
                categorySlug: (params.get("category") || "").trim().toLowerCase(),
                categoryId: Number(params.get("categoryId") || 0) || 0
            };
        }


        function upsertCanonical(url) {
            let link = document.querySelector('link[rel="canonical"]');
            if (!link) {
                link = document.createElement("link");
                link.rel = "canonical";
                document.head.appendChild(link);
            }
            link.href = url;
        }
        function setMetaDescription(content) {
            let meta = document.querySelector('meta[name="description"]');
            if (!meta) {
                meta = document.createElement("meta");
                meta.name = "description";
                document.head.appendChild(meta);
            }
            meta.content = content || "";
        }
        function renderBreadcrumbFromApiPath(pathNames, pathSlugs) {
            const bc = document.getElementById("breadcrumb");
            if (!bc) return;

            let html = `<a href="/home.html" style="color:#9ca3af">Accueil</a>`;
            let acc = "";
            for (let i = 0; i < pathSlugs.length; i++) {
                const slug = String(pathSlugs[i] || "").trim();
                const label = String(pathNames[i] || "").trim() || slug;
                acc += (i === 0 ? "" : "/") + slug;

                if (i === pathSlugs.length - 1) {
                    html += ` <span style="opacity:.6">›</span> <strong style="color:#e5e7eb">${label}</strong>`;
                } else {
                    html += ` <span style="opacity:.6">›</span> <a href="/c/${acc}" style="color:#9ca3af">${label}</a>`;
                }
            }
            bc.innerHTML = html;
        }

        async function loadChildren(parentId, parentFullSlug) {
            const box = document.getElementById("subCategories");
            if (!box) return;

                const j = await r.json();

                if (!j.ok || !Array.isArray(j.items) || !j.items.length) {
                    box.innerHTML = "";
                    return;
                }

                box.innerHTML = j.items.map(ch => `
                                          <div class="subcat-card" onclick="location.href='/c/${parentFullSlug}/${ch.slug}'">
                                            ${ch.name}
                                          </div>
                                        `).join("");

                console.error("loadChildren error:", e);
                box.innerHTML = "";
            }

        async function loadCategorySeoByPath(fullPath) {
            fullPath = String(fullPath || "").trim().replace(/^\/+|\/+$/g, "");
            if (!fullPath) return;

            const res = await fetch(`/api/categories/by-path/${fullPath}`, { cache: "no-store" });
            if (!res.ok) return;

            const data = await res.json();
            const c = data.item;
            if (!c) return;

            document.title = (c.metaTitle || (c.name ? (c.name + " | Ranita") : "Produits | Ranita"));


            setMetaDescription(
                c.metaDescription ||
                (`Découvrez ${c.name} sur Ranita : meilleurs prix, articles de qualité et livraison rapide.`)
            );

            upsertCanonical(`${location.origin}/c/${c.fullSlug || fullPath}`);

            const h1 = document.getElementById("categoryTitle");
            if (h1) h1.textContent = c.name || "Produits";

            const descBox = document.getElementById("categoryDescription");
            if (descBox) {
                const txt = (c.description || "").trim();
                if (txt) {
                    descBox.textContent = txt;
                    descBox.style.display = "block";
                } else {
                    descBox.textContent = "";
                    descBox.style.display = "none";
                }
            }

            if (Array.isArray(c.pathNames) && Array.isArray(c.pathSlugs) && c.pathSlugs.length) {
                renderBreadcrumbFromApiPath(c.pathNames, c.pathSlugs);
            }

            if (c.hasChildren) {
                await loadChildren(c.id, c.fullSlug || fullPath);
            } else {
                const sub = document.getElementById("subCategories");
                if (sub) sub.innerHTML = "";
            }
        }

        function fmtMoney(v) {
            if (typeof window.fmtFCFA === "function") return window.fmtFCFA(v);
            return Number(v || 0).toLocaleString("fr-FR") + " FCFA";
        }


        function promoHtml(basePrice, promoPrice, comparePrice = 0, discountPercent = 0) {
            const price = Number(basePrice || 0);
            const promo = Number(promoPrice || 0);
            const compare = Number(comparePrice || 0);
            const discount = Number(discountPercent || 0);

            if (promo > 0 && price > 0 && promo < price) {
                const pct = Math.round(((price - promo) / price) * 100);

                return `
                        <div class="priceRow">
                            <div class="priceNow">${fmtMoney(promo)}</div>
                            <div class="priceOld">${fmtMoney(price)}</div>
                            <span class="promoBadge">-${pct}%</span>
                        </div>
                    `;
            }

            if (compare > 0 && price > 0 && compare > price) {
                const pct = discount > 0 ? discount : Math.round(((compare - price) / compare) * 100);

                return `
                        <div class="priceRow">
                            <div class="priceNow">${fmtMoney(price)}</div>
                            <div class="priceOld">${fmtMoney(compare)}</div>
                            <span class="promoBadge">-${pct}%</span>
                        </div>
                    `;
            }

            return `
                    <div class="priceRow">
                        <div class="priceNow">${fmtMoney(price)}</div>
                    </div>
                `;
        }




        function getCategorySlugFromQuery() {
            const params = new URLSearchParams(location.search);
            return (params.get("category") || "").trim().toLowerCase();
        }

        function getCategoryIdFromQuery() {
            const params = new URLSearchParams(location.search);
            const id = Number(params.get("categoryId") || 0);
            return Number.isFinite(id) && id > 0 ? id : 0;
        }


        function getEffectivePrice(p) {
            const promo = Number(p.pricePromo ?? p.PricePromo ?? 0);
            const price = Number(p.price ?? 0);
            return promo > 0 && promo < price ? promo : price;
        }

        function getComparePrice(p) {
            return Number(
                p.oldPrice ??
                p.compareAtPrice ??
                p.priceOld ??
                0
            );
        }

        function isProductOnPromo(p) {
            const price = Number(p.price ?? 0);
            const promoPrice = Number(p.pricePromo ?? p.PricePromo ?? 0);
            const comparePrice = getComparePrice(p);
            const discountPercent = Number(p.discountPercent ?? p.flashDiscountPercent ?? 0);
            const isPromoFlag = !!(p.isPromo ?? p.IsPromo ?? false);

            if (promoPrice > 0 && price > 0 && promoPrice < price) return true;
            if (comparePrice > 0 && price > 0 && comparePrice > price) return true;
            if (comparePrice > 0 && promoPrice > 0 && comparePrice > promoPrice) return true;
            if (discountPercent > 0) return true;
            if (isPromoFlag) return true;

            return false;
        }

        function isProductVisible(p) {
            if (!p) return false;

            const isDeleted = !!(p.isDeleted ?? p.IsDeleted ?? false);
            const isActive = p.isActive ?? p.IsActive;

            if (isDeleted) return false;
            if (isActive === false) return false;

            return true;
        }

        let allLoadedItems = [];
        let selectedCategories = new Set();

        function hydrateSelectedCategoriesFromUrl() {
            const params = new URLSearchParams(location.search);

            const catName = (params.get("cat") || "").trim().toLowerCase();
            if (catName) {
                selectedCategories.add(catName);
            }
        }

        function updatePriceLabel() {
            const range = document.getElementById("priceRange");
            const label = document.getElementById("priceRangeValue");
            if (!range || !label) return;

            const max = Number(range.value || 0);
            label.textContent = `0 - ${max.toLocaleString("fr-FR")} FCFA`;
        }

        function renderCategoryFilters(items) {
            const list = document.getElementById("categoryList");
            if (!list) return;

            const map = new Map();

            items.forEach(p => {
                const name = String(p.category?.name || p.categoryName || "").trim();
                if (!name) return;
                const key = name.toLowerCase();
                if (!map.has(key)) map.set(key, name);
            });

            const categories = [...map.entries()].sort((a, b) => a[1].localeCompare(b[1], "fr"));

            list.innerHTML = categories.map(([key, label]) => `
                    <li data-category-name="${label.toLowerCase()}">
                        <label style="display:flex;align-items:center;gap:8px;">
                            <input type="checkbox" class="categoryFilterCheck" value="${key}">
                            <span>${label}</span>
                        </label>
                    </li>
                `).join("");

            list.querySelectorAll(".categoryFilterCheck").forEach(cb => {
                cb.checked = selectedCategories.has(cb.value);

                cb.addEventListener("change", () => {
                    if (cb.checked) selectedCategories.add(cb.value);
                    else selectedCategories.delete(cb.value);
                });
            });

            filterCategoryList();
        }

        function filterCategoryList() {
            const input = document.getElementById("categorySearch");
            const list = document.getElementById("categoryList");
            if (!input || !list) return;

            const term = input.value.trim().toLowerCase();
            const items = list.querySelectorAll("li");

            items.forEach(li => {
                const name = li.getAttribute("data-category-name") || "";
                li.style.display = !term || name.includes(term) ? "" : "none";
            });
        }



        function getFilteredItems(items) {
            const params = new URLSearchParams(location.search);
            const q = (params.get("q") || "").toLowerCase().trim();
            const promoOnlyFromUrl = params.get("promo") === "1";

            const priceMax = Number(document.getElementById("priceRange")?.value || 1000000);
            const promoChecked = !!document.getElementById("promoFilter")?.checked;

            return items.filter(p => {
                if (!isProductVisible(p)) return false;

                const name = String(p.name || "").toLowerCase();
                const stock = Number(p.stock ?? 0);
                const price = getEffectivePrice(p);
                const categoryName = String(p.category?.name || p.categoryName || "").trim().toLowerCase();

                if (q && !name.includes(q)) return false;

                if (promoOnlyFromUrl) {
                    if (!isProductOnPromo(p)) return false;
                    if (stock <= 0) return false;
                }

                if (selectedCategories.size > 0 && !selectedCategories.has(categoryName)) {
                    return false;
                }

                if (price > priceMax) return false;

                if (promoChecked && !isProductOnPromo(p)) return false;

                return true;
            });
        }


        async function load() {

            const err = document.getElementById("err");

            grid.innerHTML = `
<div class="muted" style="padding:20px;text-align:center">

                }
                else if (categorySlug) {
                    try {

                        let seoJson = null;
                        try {
                            seoJson = text ? JSON.parse(text) : null;
                        } catch {
                            throw new Error("Réponse non JSON (API cassée)");
                        }

                        if (!seoRes.ok || !seoJson?.item) {
                            throw new Error("Catégorie introuvable ou erreur serveur");
                        }

                        if (!seoRes.ok || !seoJson?.item) {
                            throw new Error("Catégorie introuvable.");
                        }

                        document.title = c.metaTitle || `${c.name} | Ranita`;

                        if (h1) h1.textContent = c.name || "Produits";

                        const descBox = document.getElementById("categoryDescription");
                        if (descBox) {
                            const txt = (c.description || "").trim();
                            if (txt) {
                                descBox.textContent = txt;
                                descBox.style.display = "block";
                            } else {
                                descBox.textContent = "";
                                descBox.style.display = "none";
                            }

                        const bc = document.getElementById("breadcrumb");

                        const r = await fetch(`/api/products?categoryId=${encodeURIComponent(c.id)}`, { cache: "no-store" });
                        const j = await r.json();

                        items = Array.isArray(j) ? j :
                            Array.isArray(j.items) ? j.items :
                                Array.isArray(j.data) ? j.data :
                                    Array.isArray(j.data?.items) ? j.data.items : [];

                    } catch (e) {
                        console.warn("SEO catégorie slug non chargé :", e);
                        throw e;
                    }
                }

                else if (categoryId) {
                    const r = await fetch(`/api/products?categoryId=${encodeURIComponent(categoryId)}`, { cache: "no-store" });
                    const j = await r.json();

                    items = Array.isArray(j) ? j :
                        Array.isArray(j.items) ? j.items :
                            Array.isArray(j.data) ? j.data :
                                Array.isArray(j.data?.items) ? j.data.items : [];
                }
                else {
                    const res = await apiGetProductsPublicSafe("");
                    items =
                        Array.isArray(res) ? res :
                            Array.isArray(res.items) ? res.items :
                                Array.isArray(res.data) ? res.data :
                                    Array.isArray(res.data?.items) ? res.data.items : [];
                }

                err.textContent = "";

                allLoadedItems = items;
                hydrateSelectedCategoriesFromUrl();
                renderCategoryFilters(allLoadedItems);

                const filtered = getFilteredItems(items);

                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="muted">Aucun produit.</div>`;
                    return;
                }

                const total = filtered.length;
                const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
                let page = getPageFromUrl();
                if (page > totalPages) page = totalPages;

                const start = (page - 1) * PAGE_SIZE;
                const safeItems = filtered.filter(p => p && Number(p.id) > 0);

                const pageItems = safeItems.slice(start, start + PAGE_SIZE);

                const pager = document.getElementById("pager");
                const btnPrev = document.getElementById("btnPrev");
                const btnNext = document.getElementById("btnNext");
                const pageInfo = document.getElementById("pageInfo");

                if (pager) pager.style.display = total > PAGE_SIZE ? "flex" : "none";
                if (pageInfo) pageInfo.textContent = `Page ${page} / ${totalPages}`;

                if (btnPrev) {
                    btnPrev.disabled = page <= 1;
                    btnPrev.onclick = () => setPageToUrl(page - 1);

                if (btnNext) {
                    btnNext.disabled = page >= totalPages;
                    btnNext.onclick = () => setPageToUrl(page + 1);
                }

                const prefetched = new Set();

                    const id = String(productId);

                    if (prefetched.has(id)) return;
                    prefetched.add(id);

                    // 🔥 seulement API (pas le HTML)
                    fetch(`/api/products/${id}`, { cache: "no-store" }).catch(() => { });

                        (window.absUrl ? window.absUrl((p.images || [])[0]?.url) : "");


                    console.log("PRODUIT PUBLIC =", {
                        id: p.id,
                        name: p.name,
                        price: p.price,
                        pricePromo: p.pricePromo,

                    div.innerHTML = `
<a href="/product.html?id=${encodeURIComponent(p.id)}" style="display:block">

                         onerror="this.onerror=null; this.src='/assets/img/placeholder.jpg';">

                <div class="productTitle" style="flex:1;min-width:0" title="${p.name}">${p.name}</div>

                        <button

${promoHtml(

                    const productLink = div.querySelector("a");

                            btnAdd.classList.add("btnOut");

                        if (window.__fullProdCache.has(id)) return window.__fullProdCache.get(id);

                        const r = await fetch(`/api/products/${id}`, { cache: "no-store" });
                        const j = await r.json().catch(() => null);

                        if (!r.ok) throw new Error(j?.message || ("GET /api/products/" + id + " => " + r.status));

                        const full =
                            j?.item ??
                            j?.data?.item ??
                            j?.data ??
                            j;

                        window.__fullProdCache.set(id, full);
                        return full;
                    }

                    btnAdd.addEventListener("click", async () => {
                        const stockBtn = Number(btnAdd.getAttribute("data-stock") || stock || 0);
                        const totalQty = qtyInCartByProductId(p.id);

                        if (btnAdd.dataset.locked === "stock0") return;

                        if (btnAdd.dataset.locked === "stockmax" || (stockBtn > 0 && totalQty >= stockBtn)) {
                            applyLockedState();
                            return;
                        }

                        if (btnAdd.dataset.locked === "cart") {
                            location.href = "/cart.html";
                            return;
                        }

                        try {
                            const full = await getFullProduct(p.id);

                            const hasVars =
                                (window.hasVariants && window.hasVariants(full)) ||
                                (Array.isArray(full?.variants) && full.variants.length > 0) ||
                                (Array.isArray(full?.attributes) && full.attributes.some(a => a.isVariant)) ||
                                (Array.isArray(full?.Attributes) && full.Attributes.some(a => a.IsVariant)) ||
                                String(full?.sizes || "").trim() !== "" ||
                                String(full?.colors || "").trim() !== "";

                            console.log("FULL PRODUCT FOR MODAL =", full);
                            console.log("FULL ATTRIBUTES =", full?.attributes, full?.Attributes);
                            console.log("FULL VARIANTS =", full?.variants, full?.Variants);

                            if (hasVars) {
                                if (typeof window.openVariantsModal === "function") {
                                    window.openVariantsModal(full);
                                } else {
                                    console.error("openVariantsModal introuvable (modal-variants.js?)");
                                }
                                return;
                            }

                            const rr = window.addToCartOnce({
                                id: full.id || p.id,
                                name: full.name || p.name,
                                img: full.mainImageUrl || full.mainImage || full.imageUrl || full.image || full.photo || ""
                            }, {
                                price: window.effectivePrice
                                    ? window.effectivePrice(full)
                                    : (full.price ?? p.price),

                                variantId: 0,
                                variantLabel: "",
                                variantStock: Number(full.stock ?? 0)
                            });

                            refreshCount();
                            applyLockedState();
                            if (rr?.added) flashAdded(btnAdd);

                        } catch (e) {
                            console.error(e);
                            alert("Erreur: " + (e?.message || e));
                        }
                    });

                    grid.appendChild(div);
                });

            } catch (e) {
                document.getElementById("err").textContent = "❌ " + (e?.message || e);
            }
        }

        function openFilterModal() {
            const overlay = document.getElementById("filterOverlay");
            const categorySearch = document.getElementById("categorySearch");

            if (overlay) overlay.style.display = "flex";

            if (categorySearch) {
                categorySearch.value = "";
                filterCategoryList();
                categorySearch.focus();
            }
        }

        function closeModal() {
            const overlay = document.getElementById("filterOverlay");
            if (overlay) overlay.style.display = "none";
        }

        document.addEventListener("click", (e) => {
            if (e.target.closest("#filterBtnHeader")) {
                openFilterModal();
            }
        });

        document.getElementById("closeFilterBtn")?.addEventListener("click", closeModal);

        document.getElementById("applyFiltersBtn")?.addEventListener("click", () => {
            closeModal();
            load();
        });

        document.getElementById("categorySearch")?.addEventListener("input", filterCategoryList);

        document.getElementById("resetFiltersBtn")?.addEventListener("click", () => {
            selectedCategories.clear();

            const priceRange = document.getElementById("priceRange");
            const promoFilter = document.getElementById("promoFilter");
            const categorySearch = document.getElementById("categorySearch");

            if (priceRange) priceRange.value = "1000000";
            if (promoFilter) promoFilter.checked = false;
            if (categorySearch) categorySearch.value = "";

            updatePriceLabel();
            renderCategoryFilters(allLoadedItems);
            load();
        });

        document.getElementById("priceRange")?.addEventListener("input", updatePriceLabel);

        document.getElementById("filterOverlay")?.addEventListener("click", (e) => {
            if (e.target.id === "filterOverlay") {
                closeModal();
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            window.renderSiteHeader?.();
            if (typeof window.initMegaMenu === "function") window.initMegaMenu();
            updatePriceLabel();
            load();
        });

        document.addEventListener("DOMContentLoaded", () => {
            if (window.renderSiteHeader) {
                window.renderSiteHeader();
            }
        });
    </script>

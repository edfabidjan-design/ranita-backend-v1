<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Réinitialisation vendeur</title>
    <link rel="stylesheet" href="/css/base.css?v=1" />
</head>

<body>
    <main class="wrap" style="max-width:520px;margin:40px auto;padding:0 14px">

        <h1>🔐 Mot de passe oublié</h1>
        <p class="muted">Entre ton email vendeur</p>

        <div id="msg" class="msg" style="display:none"></div>

        <input id="email" placeholder="Email vendeur"
               style="margin-top:12px" />

        <button id="btnSend"
                class="btn btnYellow"
                style="width:100%;margin-top:16px">
            Envoyer le code
        </button>

        <a href="/vendor-login.html" class="btn"
           style="margin-top:10px;display:block;text-align:center">
            Retour
        </a>

    </main>

    <script>
        const msg = document.getElementById("msg");

        function show(text, ok = false) {
            msg.style.display = "block";
            msg.textContent = text;
            msg.style.borderColor = ok ? "green" : "red";
        }

        document.getElementById("btnSend").onclick = async () => {
            try {
                const email = document.getElementById("email").value.trim();

                const r = await fetch("/api/vendor-auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await r.json().catch(() => null);

                if (!r.ok || !data?.ok) {
                    throw new Error(data?.message || "Erreur.");
                }

                show(data?.message || "Si un compte vendeur existe, un code a été envoyé.", true);

                setTimeout(() => {
                    location.href = "/vendor-reset-password.html";
                }, 1000);

            } catch (e) {
                show(e?.message || "Erreur");
            }
        };
    </script>
</body>
</html>

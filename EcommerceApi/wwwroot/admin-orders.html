<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ranita Admin - Commandes</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">

    <style>
        .filters-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: end;
            margin-bottom: 14px;
        }

            .filters-bar .field {
                min-width: 0;
                flex: 1 1 220px;
            }

                .filters-bar .field.small {
                    flex: 0 0 180px;
                }

            .filters-bar label {
                display: block;
                margin-bottom: 6px;
                font-size: 12px;
                color: #94a3b8;
                font-weight: 700;
            }

            .filters-bar input,
            .filters-bar select {
                width: 100%;
            }

        .orders-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .orders-summary {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 700;
        }

        .orders-pager {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .btn-shop {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 12px;
            border: 1px solid rgba(34,197,94,.35);
            background: rgba(34,197,94,.10);
            color: #22c55e;
        }
    </style>
</head>

<body class="admin-body">
    <div class="admin-shell">

        <header class="admin-header">
            <div id="appHeader"></div>
        </header>

        <main class="admin-content">
            <div class="page-admin">
                <div class="container">

                    <!-- ✅ HEADER PRO -->
                    <section class="dashboard-head">
                        <h1 id="pageTitle"></h1>
                        <p class="dashboard-subtitle">
                            Suivi et gestion des commandes clients
                        </p>
                    </section>

                    <section class="card table-card">

                        <!-- FILTRES -->
                        <div class="filters-bar">
                            <div class="field">
                                <label>Recherche</label>
                                <input class="search" id="txtSearch" placeholder="Client, ville, téléphone..." />
                            </div>

                            <div class="field small">
                                <label>Statut</label>
                                <select id="selStatus">
                                    <option value="">Tous</option>
                                    <option value="EnAttente">En attente</option>
                                    <option value="EnPreparation">En préparation</option>
                                    <option value="EnLivraison">En livraison</option>
                                    <option value="Livree">Livrée</option>
                                    <option value="Annulee">Annulée</option>
                                </select>
                            </div>

                            <div class="field small">
                                <label>Par page</label>
                                <select id="selPageSize">
                                    <option value="10">10</option>
                                    <option value="20" selected>20</option>
                                    <option value="50">50</option>
                                </select>
                            </div>

                            <div class="field small">
                                <label>&nbsp;</label>
                                <button class="btn btn-primary" id="btnReload">Actualiser</button>
                            </div>
                        </div>

                        <!-- TITRE TABLE -->
                        <div class="orders-top">
                            <h2>Liste des commandes</h2>
                            <div class="orders-summary" id="ordersSummary">0 commande</div>
                        </div>

                        <!-- TABLE -->
                        <div class="table-wrap orders-wrap">
                            <table class="orders-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Client</th>
                                        <th>Boutique</th>
                                        <th>Téléphone</th>
                                        <th>Ville</th>
                                        <th>Total</th>
                                        <th>Statut</th>
                                        <th>Statut vendeur</th>
                                        <th>Date</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersBody"></tbody>
                            </table>
                        </div>

                        <!-- PAGINATION -->
                        <div class="orders-pager">
                            <div class="orders-summary" id="ordersPagerInfo">Page 1 / 1</div>

                            <div class="pager-actions">
                                <button class="btn" id="btnPrevPage">⬅ Précédent</button>
                                <button class="btn btn-primary" id="btnNextPage">Suivant ➡</button>
                            </div>
                        </div>

                    </section>

                </div>
            </div>
        </main>

    </div>

    <script src="/assets/js/app.js?v=1000"></script>
    <script src="/assets/js/admin-orders.js?v=2003"></script>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ranita - Notifications</title>

    <style>
        body {
            font-family: Arial;
            background: #0b1220;
            color: #e5e7eb;
            margin: 0;
            padding: 20px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

            .card:hover {
                border-color: #22c55e;
            }

        .unread {
            border-left: 4px solid #f59e0b;
        }

        .title {
            font-weight: 900;
        }

        .muted {
            color: #9ca3af;
            font-size: 13px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        .btnBack {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            background: linear-gradient(180deg, #111827 0%, #0b1220 100%);
            color: #e5e7eb;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,.25);
            transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
        }

            .btnBack:hover {
                border-color: #22c55e;
                box-shadow: 0 12px 30px rgba(34,197,94,.12), 0 10px 25px rgba(0,0,0,.25);
                transform: translateY(-1px);
            }

            .btnBack:active {
                transform: translateY(0px) scale(.99);
            }

            .btnBack .ico {
                width: 26px;
                height: 26px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 10px;
                background: #0b1220;
                border: 1px solid #1f2937;
                color: #94a3b8;
            }

            .btnBack:focus {
                outline: none;
                box-shadow: 0 0 0 3px rgba(34,197,94,.25), 0 10px 25px rgba(0,0,0,.25);
            }
    </style>
</head>
<body>

    <div class="top">
        <h2>🔔 Notifications</h2>
        <button class="btnBack" type="button" onclick="history.back()">
            <span class="ico">←</span>
            <span>Retour</span>
        </button>
    </div>

    <div id="list"></div>

    <script src="/assets/js/client-notifications.js?v=1"></script>



</body>
</html>

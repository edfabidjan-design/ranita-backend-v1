<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin - Vendeurs</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">

    <style>
        .vendors-wrap {
            max-width: 1100px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            margin: 0 0 10px;
            flex-wrap: wrap;
        }

            .toolbar select {
                padding: 10px 12px;
                border-radius: 12px;
                border: 1px solid #1f2937;
                background: #0b1220;
                color: #e5e7eb;
            }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

            .table-wrap table {
                width: 100%;
                border-collapse: collapse;
                min-width: 720px;
            }

            .table-wrap th,
            .table-wrap td {
                padding: 10px 8px;
            }

        @media (max-width: 640px) {
            .vendors-wrap {
                padding: 0 10px;
            }

            .toolbar {
                justify-content: space-between;
            }

            .table-wrap table {
                min-width: 640px;
            }
        }

        html, body {
            overflow-x: hidden;
        }

        .vendor-actions-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: nowrap; /* 🔥 empêche les retours à la ligne */
        }

        .vendor-actions-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Groupe gauche */
        .vendor-actions-view {
            flex: 1;
        }

        /* Groupe centre */
        .vendor-actions-manage {
            flex: 0;
        }

        /* Groupe droite */
        .vendor-actions-danger {
            flex: 0;
        }

        /* Boutons plus compacts */
        .vendor-actions-row .btn {
            padding: 6px 10px;
            font-size: 13px;
            border-radius: 10px;
            white-space: nowrap;
        }

        /* Supprimer = plus petit mais visible */
        .vendor-actions-danger .btn {
            padding: 6px 12px;
            font-weight: 700;
        }
    </style>
</head>

<body class="admin-body">
    <div class="admin-shell">

        <header class="admin-header">
            <div id="appHeader"></div>
        </header>

        <main class="admin-content">
            <div class="page-admin">
                <div class="container vendors-wrap">

                    <section class="dashboard-head">
                        <h1 id="pageTitle"></h1>
                        <p class="dashboard-subtitle">Gestion des comptes vendeurs et validation des boutiques</p>
                    </section>

                    <div class="toolbar">


                        <label class="muted" for="selVendorStatus">Filtre :</label>
                        <select id="selVendorStatus">
                            <option value="-1" selected>Tous</option>
                            <option value="0">En attente</option>
                            <option value="1">Validés</option>
                            <option value="2">Refusés</option>
                            <option value="3">Retirés</option>
                        </select>
                    </div>

                    <div class="card" style="padding:12px;border-radius:14px">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr class="muted" style="text-align:left">
                                        <th>Nom</th>
                                        <th>Email</th>
                                        <th>📧 Email envoyé</th>
                                        <th>📄 Accord reçu</th>
                                        <th>Date</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="vendorsBody">
                                    <tr><td colspan="4" class="muted">Chargement...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </main>

    </div>


    <!-- 🔐 MODAL SUPPRESSION VENDEUR -->
    <div id="deleteVendorModal" style="
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:3000;
    padding:16px;
">
        <div style="
        width:100%;
        max-width:420px;
        background:#0f172a;
        border-radius:18px;
        padding:18px;
    ">
            <h3>Confirmer suppression</h3>

            <div id="deleteVendorTarget"></div>

            <input id="deleteVendorPassword" type="password" placeholder="Mot de passe" />

            <div id="deleteVendorError" style="color:red;display:none"></div>

            <div style="margin-top:12px">
                <button id="btnCancelDeleteVendor" class="btn">Annuler</button>
                <button id="btnConfirmDeleteVendor" class="btn" style="background:red;color:white">
                    Supprimer
                </button>
            </div>
        </div>
    </div>


    <script src="/assets/js/app.js?v=2"></script>
    <script src="/assets/js/admin-vendors.js?v=2"></script>





</body>
</html>

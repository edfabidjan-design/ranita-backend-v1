<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ranita Admin — Détail produit</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">

    <style>
        .wrap {
            max-width: 1180px;
            margin: 22px auto;
            padding: 0 14px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .title {
            font-size: 20px;
            font-weight: 900;
        }

        .sub {
            color: #94a3b8;
            font-weight: 700;
            font-size: 13px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr .8fr;
            gap: 14px;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(17,24,39,.9);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 16px;
            padding: 12px;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .kv {
            display: grid;
            gap: 4px;
            min-width: 180px;
        }

        .k {
            color: #94a3b8;
            font-weight: 800;
            font-size: 12px;
        }

        .v {
            font-weight: 900;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 900;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,.12);
        }

        .b-pending {
            background: #92400e;
            color: #fff;
        }

        .b-published {
            background: #065f46;
            color: #fff;
        }

        .b-rejected {
            background: #7f1d1d;
            color: #fff;
        }

        .b-deleted {
            background: #111827;
            color: #fff;
            opacity: .85;
        }

        .gal {
            display: grid;
            gap: 10px;
        }

        .mainimg {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: contain;
            background: rgba(0,0,0,.25);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,.10);
        }

        .thumbs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .th {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.12);
            cursor: pointer;
            opacity: .9;
        }

            .th.active {
                outline: 2px solid rgba(255,255,255,.35);
                opacity: 1;
            }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }

        th {
            text-align: left;
            color: #94a3b8;
            font-weight: 900;
            font-size: 12px;
        }

        .muted {
            color: #94a3b8;
            font-weight: 700;
        }

        .btn {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.06);
            color: #e5e7eb;
            font-weight: 900;
            cursor: pointer;
        }

            .btn:hover {
                background: rgba(255,255,255,.10);
            }

            .btn.ok {
                background: rgba(6,95,70,.35);
                border-color: rgba(6,95,70,.6);
            }

            .btn.danger {
                background: rgba(127,29,29,.35);
                border-color: rgba(127,29,29,.6);
            }

            .btn:disabled {
                opacity: .55;
                cursor: not-allowed;
            }

        textarea {
            width: 100%;
            min-height: 86px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(0,0,0,.20);
            color: #e5e7eb;
            padding: 10px;
            font-weight: 700;
        }

        .msg {
            margin: 10px 0;
            font-weight: 900;
        }

        /* ✅ RESPONSIVE SAFE (ne casse pas le layout) */
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-wrap: wrap;
            }
        }

        /* ✅ MOBILE */
        @media (max-width: 560px) {
            .wrap {
                margin: 14px auto;
                padding: 0 10px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

                /* badge + bouton retour restent côte à côte si possible */
                .topbar .row {
                    width: 100%;
                    justify-content: space-between;
                }

            /* galerie + thumbs plus petits */
            .mainimg {
                aspect-ratio: 4/3;
            }

            .th {
                width: 54px;
                height: 54px;
            }

            /* Les blocs infos passent mieux */
            .kv {
                min-width: 150px;
            }

            /* ✅ Table: scroll horizontal si trop large */
            .table-wrap {
                overflow-x: auto;
                max-width: 100%;
                -webkit-overflow-scrolling: touch;
            }

                .table-wrap table {
                    width: 100%;
                    min-width: 420px; /* optionnel si tu veux scroll uniquement dans table */
                }

            table {
                min-width: 0;
            }
        }

        html, body {
            overflow-x: hidden;
        }
    </style>
</head>
<body class="admin-body">
    <div class="wrap">
        <div class="topbar">
            <div>
                <div class="title" id="pTitle">Détail produit</div>
                <div class="sub" id="pSub">—</div>
            </div>
            <div class="row">
                <button class="btn" id="btnBack">← Retour</button>
                <span id="pBadge" class="badge b-pending">Pending</span>
            </div>
        </div>

        <div id="msg" class="msg muted"></div>

        <div class="grid">
            <!-- LEFT -->
            <div class="card">
                <div class="gal">
                    <img id="mainImg" class="mainimg" src="/assets/placeholder.png" alt="">
                    <div id="thumbs" class="thumbs"></div>
                </div>

                <div style="height:12px"></div>

                <div class="row" id="infoRow"></div>

                <div style="height:14px"></div>

                <div class="card" style="padding:12px;">
                    <div style="font-weight:900;margin-bottom:8px;">Attributs</div>
                    <div id="attrsBox" class="muted">—</div>
                </div>

                <div style="height:14px"></div>

                <div class="card" style="padding:12px;">
                    <div style="font-weight:900;margin-bottom:8px;">Variantes / Stock</div>
                    <div class="muted" id="varsHint">—</div>
                    <div style="height:8px"></div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th id="th1">Option 1</th>
                                    <th id="th2">Option 2</th>
                                    <th style="width:140px">Stock</th>
                                </tr>
                            </thead>
                            <tbody id="varsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="card">
                <div style="font-weight:900;margin-bottom:10px;">Actions de modération</div>

                <div class="muted" style="margin-bottom:8px;">
                    Publier = visible côté client (si vendeur actif + produit actif + Published).<br>
                    Rejeter = non visible côté client.
                </div>

                <label class="muted" style="display:block;margin:10px 0 6px;">Motif (optionnel)</label>
                <textarea id="rejectReason" placeholder="Ex: photos floues, description insuffisante, produit interdit..."></textarea>

                <div style="height:10px"></div>

                <div class="row">
                    <button class="btn ok" id="btnPublish">✅ Publier</button>
                    <button class="btn danger" id="btnReject">❌ Rejeter</button>
                </div>

                <div style="height:12px"></div>
                <div class="muted" id="rightInfo">—</div>

                <div style="height:8px"></div>
                <div class="muted" id="rejectInfo"></div>
            </div>
        </div>
    </div>

    <!-- IMPORTANT: app.js doit exposer window.fetchJson (avec token admin) -->
    <script src="/assets/js/app.js?v=1"></script>
    <script src="/assets/js/admin-product-detail.js?v=1"></script>



</body>
</html>
